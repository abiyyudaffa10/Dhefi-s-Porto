<!doctype html><html lang="en"><head><meta charset="utf-8">
<title>FOLK slide — Comparison</title><link rel="stylesheet" href="slides.css"></head>
<body>
<section class="slide" data-screen-label="Comparison">
  <div class="s-kicker">Before &amp; after</div>
  <h1 class="s-title" style="font-size:3rem;margin-top:20px;">From scattered to <em>systematic</em></h1>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:32px;margin-top:48px;flex:1;">
    <div style="border:2.5px solid var(--ink);border-radius:var(--r-xl);padding:34px;background:var(--card);">
      <div style="font-family:var(--font-mono);font-size:.85rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-mute);">Before</div>
      <div style="font-family:var(--font-display);font-weight:700;font-size:1.7rem;margin:10px 0 22px;letter-spacing:-.01em;">Manual &amp; ad-hoc</div>
      <ul style="margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:14px;font-size:1.15rem;color:var(--ink-soft);">
        <li style="padding-left:26px;position:relative;"><span style="position:absolute;left:0;color:var(--ink-mute);">○</span> Resumes read one by one</li>
        <li style="padding-left:26px;position:relative;"><span style="position:absolute;left:0;color:var(--ink-mute);">○</span> Timesheets in loose files</li>
        <li style="padding-left:26px;position:relative;"><span style="position:absolute;left:0;color:var(--ink-mute);">○</span> No shared pipeline view</li>
      </ul>
    </div>
    <div style="border:2.5px solid var(--ink);border-radius:var(--r-xl);padding:34px;background:var(--teal);color:var(--paper);box-shadow:var(--shadow-hard-lg);">
      <div style="font-family:var(--font-mono);font-size:.85rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--gold);">After</div>
      <div style="font-family:var(--font-display);font-weight:700;font-size:1.7rem;margin:10px 0 22px;letter-spacing:-.01em;">One people-ops system</div>
      <ul style="margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:14px;font-size:1.15rem;">
        <li style="padding-left:26px;position:relative;"><span style="position:absolute;left:0;color:var(--gold);">✱</span> Structured screening &amp; tags</li>
        <li style="padding-left:26px;position:relative;"><span style="position:absolute;left:0;color:var(--gold);">✱</span> Validated Excel datasets</li>
        <li style="padding-left:26px;position:relative;"><span style="position:absolute;left:0;color:var(--gold);">✱</span> Shared kanban pipeline</li>
      </ul>
    </div>
  </div>
  <div class="s-foot" style="margin-top:34px;">
    <div class="s-brand"><img src="../assets/mark.svg" alt="">Dhefi<span class="dot">.</span></div>
    <div class="s-pageno">05 / 06</div>
  </div>
</section>
</body></html>
