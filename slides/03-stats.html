<!doctype html><html lang="en"><head><meta charset="utf-8">
<title>FOLK slide — Stats</title><link rel="stylesheet" href="slides.css"></head>
<body>
<section class="slide" data-screen-label="Stats">
  <div class="s-kicker">By the numbers</div>
  <h1 class="s-title" style="font-size:3rem;margin-top:20px;">A year of people operations</h1>
  <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:40px 64px;margin-top:54px;">
    <div>
      <div style="font-family:var(--font-display);font-weight:800;font-size:5.5rem;line-height:.9;letter-spacing:-.03em;">100<span style="color:var(--orange);">+</span></div>
      <div style="font-family:var(--font-mono);font-size:1rem;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-mute);margin-top:10px;">Resumes screened</div>
    </div>
    <div>
      <div style="font-family:var(--font-display);font-weight:800;font-size:5.5rem;line-height:.9;letter-spacing:-.03em;color:var(--teal);">61</div>
      <div style="font-family:var(--font-mono);font-size:1rem;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-mute);margin-top:10px;">Employees on payroll</div>
    </div>
    <div>
      <div style="font-family:var(--font-display);font-weight:800;font-size:5.5rem;line-height:.9;letter-spacing:-.03em;color:var(--gold);">60<span style="font-size:3rem;">%</span></div>
      <div style="font-family:var(--font-mono);font-size:1rem;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-mute);margin-top:10px;">Faster documentation</div>
    </div>
    <div>
      <div style="font-family:var(--font-display);font-weight:800;font-size:5.5rem;line-height:.9;letter-spacing:-.03em;color:var(--pink);">50</div>
      <div style="font-family:var(--font-mono);font-size:1rem;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-mute);margin-top:10px;">Contracts shipped</div>
    </div>
  </div>
  <div class="s-foot">
    <div class="s-brand"><img src="../assets/mark.svg" alt="">Dhefi<span class="dot">.</span></div>
    <div class="s-pageno">03 / 06</div>
  </div>
</section>
</body></html>
