<!doctype html><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--paper);font-family:var(--font-mono);color:var(--ink);padding:24px 30px;}
  .sw{display:flex;gap:14px;}
  .chip{flex:1;}
  .box{height:78px;border-radius:14px;border:1.5px solid var(--hairline);}
  .nm{font-size:12px;margin-top:8px;font-weight:700;letter-spacing:.02em;}
  .hx{font-size:11px;color:var(--ink-mute);margin-top:2px;}
</style>
<body>
  <div class="sw">
    <div class="chip"><div class="box" style="background:var(--paper)"></div><div class="nm">paper</div><div class="hx">#F4ECDB</div></div>
    <div class="chip"><div class="box" style="background:var(--paper-2)"></div><div class="nm">paper-2</div><div class="hx">#EBE0C9</div></div>
    <div class="chip"><div class="box" style="background:var(--paper-3)"></div><div class="nm">paper-3</div><div class="hx">#E2D4B8</div></div>
    <div class="chip"><div class="box" style="background:var(--card)"></div><div class="nm">card</div><div class="hx">#FBF6EA</div></div>
    <div class="chip"><div class="box" style="background:var(--white)"></div><div class="nm">white</div><div class="hx">#FFFDF8</div></div>
  </div>
</body>
