<!doctype html><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--paper);font-family:var(--font-mono);color:var(--ink);padding:24px 30px;}
  .scale{display:flex;align-items:flex-end;gap:10px;}
  .item{text-align:center;}
  .bar{background:var(--orange);border-radius:4px 4px 0 0;width:26px;}
  .nm{font-size:10px;margin-top:7px;font-weight:700;}
  .v{font-size:9px;color:var(--ink-mute);}
</style>
<body>
  <div class="scale">
    <div class="item"><div class="bar" style="height:4px"></div><div class="nm">1</div><div class="v">4</div></div>
    <div class="item"><div class="bar" style="height:8px"></div><div class="nm">2</div><div class="v">8</div></div>
    <div class="item"><div class="bar" style="height:12px"></div><div class="nm">3</div><div class="v">12</div></div>
    <div class="item"><div class="bar" style="height:16px"></div><div class="nm">4</div><div class="v">16</div></div>
    <div class="item"><div class="bar" style="height:24px"></div><div class="nm">5</div><div class="v">24</div></div>
    <div class="item"><div class="bar" style="height:32px"></div><div class="nm">6</div><div class="v">32</div></div>
    <div class="item"><div class="bar" style="height:48px"></div><div class="nm">7</div><div class="v">48</div></div>
    <div class="item"><div class="bar" style="height:64px"></div><div class="nm">8</div><div class="v">64</div></div>
    <div class="item"><div class="bar" style="height:96px"></div><div class="nm">9</div><div class="v">96</div></div>
    <div class="item"><div class="bar" style="height:118px"></div><div class="nm">10</div><div class="v">128</div></div>
  </div>
</body>
