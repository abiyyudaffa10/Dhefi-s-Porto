<!doctype html><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--paper);font-family:var(--font-body);color:var(--ink);padding:24px 30px;}
  .specimen{display:flex;flex-direction:column;gap:14px;}
  .line{display:flex;align-items:baseline;gap:16px;}
  .tag{font-family:var(--font-mono);font-size:11px;color:var(--ink-mute);width:118px;flex:none;letter-spacing:.03em;padding-top:.4em;}
  .h1{font-family:var(--font-display);font-weight:700;font-size:40px;letter-spacing:-.02em;line-height:1;}
  .h2{font-family:var(--font-display);font-weight:700;font-size:30px;letter-spacing:-.02em;}
  .h3{font-family:var(--font-display);font-weight:600;font-size:22px;}
  .bd{font-family:var(--font-body);font-size:16px;color:var(--ink-soft);}
  .sm{font-family:var(--font-body);font-size:13px;color:var(--ink-mute);}
</style>
<body>
  <div class="specimen">
    <div class="line"><span class="tag">H1 · 700</span><span class="h1">Show your work.</span></div>
    <div class="line"><span class="tag">H2 · 700</span><span class="h2">Know your folk.</span></div>
    <div class="line"><span class="tag">H3 · 600</span><span class="h3">Selected case studies</span></div>
    <div class="line"><span class="tag">BODY · 400</span><span class="bd">Hanken Grotesque keeps long-form copy calm and legible.</span></div>
    <div class="line"><span class="tag">SMALL · 400</span><span class="sm">Captions, footnotes, and metadata sit here.</span></div>
  </div>
</body>
