<!doctype html><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--paper);font-family:var(--font-mono);color:var(--ink);padding:24px 30px;}
  .row{display:flex;gap:18px;align-items:flex-end;}
  .item{text-align:center;}
  .box{width:84px;height:64px;background:var(--card);border:1.5px solid var(--ink);}
  .nm{font-size:11px;margin-top:8px;font-weight:700;}
  .v{font-size:10px;color:var(--ink-mute);}
</style>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:var(--r-sm)"></div><div class="nm">sm</div><div class="v">8px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--r-md)"></div><div class="nm">md</div><div class="v">14px · inputs</div></div>
    <div class="item"><div class="box" style="border-radius:var(--r-lg)"></div><div class="nm">lg</div><div class="v">22px · cards</div></div>
    <div class="item"><div class="box" style="border-radius:var(--r-xl)"></div><div class="nm">xl</div><div class="v">34px · panels</div></div>
    <div class="item"><div class="box" style="border-radius:var(--r-pill);width:64px"></div><div class="nm">pill</div><div class="v">999px</div></div>
  </div>
</body>
