<!doctype html><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--paper);font-family:var(--font-body);color:var(--ink);padding:26px 30px;}
  .big{font-family:var(--font-display);font-weight:800;font-size:84px;line-height:.92;letter-spacing:-.03em;}
  .big .dot{color:var(--orange);}
  .row{display:flex;align-items:baseline;gap:22px;flex-wrap:wrap;margin-top:10px;}
  .meta{font-family:var(--font-mono);font-size:12px;color:var(--ink-mute);letter-spacing:.04em;}
  i{font-style:italic;color:var(--orange);}
</style>
<body>
  <div class="big">Folk<span class="dot">.</span> <i>funk</i></div>
  <div class="row">
    <span class="meta">BRICOLAGE GROTESQUE</span>
    <span class="meta">800 · DISPLAY</span>
    <span class="meta">tracking −0.03em · line-height .92</span>
  </div>
</body>
