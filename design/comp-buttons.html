<!doctype html><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--paper);font-family:var(--font-body);color:var(--ink);padding:26px 30px;}
  .row{display:flex;gap:16px;align-items:center;flex-wrap:wrap;}
  .btn{font-family:var(--font-display);font-weight:700;font-size:16px;border:var(--bw) solid var(--ink);border-radius:var(--r-md);padding:12px 22px;cursor:pointer;display:inline-flex;align-items:center;gap:8px;}
  .primary{background:var(--orange);color:var(--white);box-shadow:var(--shadow-hard);}
  .secondary{background:var(--card);color:var(--ink);box-shadow:var(--shadow-hard);}
  .ghost{background:transparent;border-color:transparent;color:var(--ink);text-decoration:underline;text-underline-offset:4px;text-decoration-color:var(--orange);text-decoration-thickness:2px;}
  .pressed{background:var(--orange-deep);color:var(--white);box-shadow:1px 1px 0 var(--ink);transform:translate(2px,2px);}
  .lab{font-family:var(--font-mono);font-size:10px;color:var(--ink-mute);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:8px;}
  .grp{display:flex;flex-direction:column;}
</style>
<body>
  <div class="row">
    <div class="grp"><span class="lab">Primary</span><button class="btn primary">Hire me</button></div>
    <div class="grp"><span class="lab">Secondary</span><button class="btn secondary">See the work</button></div>
    <div class="grp"><span class="lab">Pressed</span><button class="btn primary pressed">Hire me</button></div>
    <div class="grp"><span class="lab">Ghost / link</span><button class="btn ghost">Say hello</button></div>
  </div>
</body>
