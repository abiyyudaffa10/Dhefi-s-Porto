<!doctype html><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--paper);font-family:var(--font-mono);color:var(--ink);padding:24px 30px;}
  .sw{display:flex;gap:14px;}
  .chip{flex:1;}
  .box{height:78px;border-radius:14px;border:1.5px solid var(--hairline);}
  .nm{font-size:12px;margin-top:8px;font-weight:700;}
  .hx{font-size:11px;color:var(--ink-mute);margin-top:2px;}
</style>
<body>
  <div class="sw">
    <div class="chip"><div class="box" style="background:var(--ink)"></div><div class="nm">ink</div><div class="hx">#1C1916</div></div>
    <div class="chip"><div class="box" style="background:var(--ink-2)"></div><div class="nm">ink-2</div><div class="hx">#34302B</div></div>
    <div class="chip"><div class="box" style="background:var(--ink-soft)"></div><div class="nm">ink-soft</div><div class="hx">#57514A</div></div>
    <div class="chip"><div class="box" style="background:var(--ink-mute)"></div><div class="nm">ink-mute</div><div class="hx">#8C8478</div></div>
    <div class="chip"><div class="box" style="background:var(--paper);box-shadow:inset 0 0 0 1.5px var(--ink)"></div><div class="nm">hairline</div><div class="hx">ink @13%</div></div>
  </div>
</body>
