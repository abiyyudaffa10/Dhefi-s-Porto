<!doctype html><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--paper);font-family:var(--font-body);color:var(--ink);padding:26px 30px;display:flex;gap:20px;}
  .card{background:var(--card);border:var(--bw) solid var(--ink);border-radius:var(--r-lg);box-shadow:var(--shadow-hard-lg);overflow:hidden;width:300px;}
  .thumb{height:96px;background:var(--teal);display:flex;align-items:flex-end;padding:12px;}
  .thumb .k{font-family:var(--font-mono);font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--white);background:#0003;padding:4px 10px;border-radius:999px;}
  .body{padding:16px;}
  .body h3{font-family:var(--font-display);font-weight:700;font-size:19px;margin:0 0 6px;letter-spacing:-.01em;}
  .body p{margin:0;font-size:14px;color:var(--ink-soft);line-height:1.5;}
  .meta{display:flex;gap:14px;margin-top:14px;font-family:var(--font-mono);font-size:11px;color:var(--ink-mute);}
  /* profile mini */
  .pcard{background:var(--card);border:var(--bw) solid var(--ink);border-radius:var(--r-lg);box-shadow:var(--shadow-hard-lg);width:230px;padding:18px;text-align:center;}
  .pcard img{width:84px;height:84px;border-radius:999px;border:2.5px solid var(--ink);object-fit:cover;}
  .pcard .nm{font-family:var(--font-display);font-weight:700;font-size:18px;margin-top:10px;}
  .pcard .rl{font-family:var(--font-mono);font-size:11px;color:var(--ink-mute);text-transform:uppercase;letter-spacing:.06em;margin-top:3px;}
  .pcard .st{margin-top:10px;font-family:var(--font-mono);font-size:12px;font-weight:700;color:var(--teal);}
</style>
<body>
  <div class="card">
    <div class="thumb"><span class="k">CASE STUDY · HR OPS</span></div>
    <div class="body">
      <h3>The HR Intervention System</h3>
      <p>Helped build a platform to track HR workflows and lift admin productivity.</p>
      <div class="meta"><span>MagangHub</span><span>2025–26</span></div>
    </div>
  </div>
  <div class="pcard">
    <img src="../assets/dhefi-circle.png" alt="">
    <div class="nm">Dhefi Dwicahyani</div>
    <div class="rl">I/O Psychology · HR</div>
    <div class="st">● Available for Q3</div>
  </div>
</body>
