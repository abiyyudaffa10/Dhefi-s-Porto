<!doctype html><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--paper);font-family:var(--font-body);color:var(--ink);padding:26px 30px;}
  .kick{font-family:var(--font-mono);font-weight:700;font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--orange);}
  .stats{display:flex;gap:34px;margin-top:22px;}
  .stat .n{font-family:var(--font-display);font-weight:800;font-size:46px;line-height:1;letter-spacing:-.02em;}
  .stat .l{font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-mute);margin-top:6px;}
  .stat:nth-child(2) .n{color:var(--teal);}
  .stat:nth-child(3) .n{color:var(--gold);}
</style>
<body>
  <div class="kick">Available for Q3 · 2026</div>
  <div class="stats">
    <div class="stat"><div class="n">100+</div><div class="l">Resumes screened</div></div>
    <div class="stat"><div class="n">61</div><div class="l">Employees · payroll</div></div>
    <div class="stat"><div class="n">3.73</div><div class="l">GPA</div></div>
  </div>
</body>
