<!doctype html><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--ink-bg);font-family:var(--font-mono);color:var(--on-dark);padding:24px 30px;}
  .sw{display:flex;gap:14px;}
  .chip{flex:1;}
  .box{height:74px;border-radius:14px;border:1.5px solid #ffffff22;}
  .nm{font-size:12px;margin-top:8px;font-weight:700;}
  .hx{font-size:11px;color:var(--on-dark-soft);margin-top:2px;}
</style>
<body>
  <div class="sw">
    <div class="chip"><div class="box" style="background:var(--ink-bg)"></div><div class="nm">ink-bg</div><div class="hx">#181513</div></div>
    <div class="chip"><div class="box" style="background:var(--ink-bg-2)"></div><div class="nm">ink-bg-2</div><div class="hx">#221E1A</div></div>
    <div class="chip"><div class="box" style="background:var(--ink-bg-3)"></div><div class="nm">ink-bg-3</div><div class="hx">#2E2924</div></div>
    <div class="chip"><div class="box" style="background:var(--on-dark)"></div><div class="nm" style="color:var(--on-dark)">on-dark</div><div class="hx">#F4ECDB</div></div>
    <div class="chip"><div class="box" style="background:var(--orange)"></div><div class="nm">orange</div><div class="hx">pops on dark</div></div>
  </div>
</body>
