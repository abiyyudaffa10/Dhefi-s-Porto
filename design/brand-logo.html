<!doctype html><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--paper);font-family:var(--font-body);color:var(--ink);padding:24px 30px;display:flex;align-items:center;gap:36px;flex-wrap:wrap;}
  .item{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .lab{font-family:var(--font-mono);font-size:10px;color:var(--ink-mute);text-transform:uppercase;letter-spacing:.08em;}
  .dark{width:96px;height:96px;background:var(--ink-bg);border-radius:22px;display:grid;place-items:center;}
  .lock{display:flex;align-items:center;gap:10px;font-family:var(--font-display);font-weight:800;font-size:34px;letter-spacing:-.03em;}
  .lock .dot{color:var(--orange);}
</style>
<body>
  <div class="item"><img src="../assets/mark.svg" width="84" height="84"><span class="lab">Mark · on paper</span></div>
  <div class="item"><div class="dark"><img src="../assets/mark.svg" width="56"></div><span class="lab">Mark · on ink</span></div>
  <div class="item"><div class="lock"><img src="../assets/mark.svg" width="38" height="38">Dhefi<span class="dot">.</span></div><span class="lab">Lockup</span></div>
</body>
