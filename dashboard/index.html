<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dhefi. — Talent Dashboard</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="icon" href="../assets/mark.svg">
<style>
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper-2);color:var(--ink);font-family:var(--font-body);-webkit-font-smoothing:antialiased;}
  .app{display:grid;grid-template-columns:248px 1fr;min-height:100vh;}

  /* ---------- sidebar ---------- */
  .sidebar{background:var(--ink-bg);color:var(--on-dark);display:flex;flex-direction:column;padding:22px 16px;position:sticky;top:0;height:100vh;}
  .sb-brand{display:flex;align-items:center;gap:10px;font-family:var(--font-display);font-weight:800;font-size:1.35rem;letter-spacing:-.03em;padding:6px 8px 22px;}
  .sb-brand .dot{color:var(--orange);}
  .sb-brand img{width:26px;height:26px;}
  .sb-sect{font-family:var(--font-mono);font-size:.64rem;letter-spacing:.14em;text-transform:uppercase;color:var(--on-dark-soft);padding:18px 10px 8px;}
  .sb-link{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:var(--r-md);font-size:.95rem;color:var(--on-dark-soft);cursor:pointer;transition:background var(--dur-fast),color var(--dur-fast);border:none;background:none;width:100%;text-align:left;font-family:var(--font-body);}
  .sb-link svg{width:19px;height:19px;}
  .sb-link:hover{background:var(--ink-bg-2);color:var(--on-dark);}
  .sb-link.active{background:var(--orange);color:var(--white);font-weight:600;}
  .sb-user{margin-top:auto;display:flex;align-items:center;gap:11px;padding:12px 10px;border-top:1px solid var(--ink-bg-3);}
  .sb-user img{width:38px;height:38px;border-radius:999px;object-fit:cover;border:1.5px solid var(--ink-bg-3);}
  .sb-user .nm{font-size:.88rem;font-weight:600;color:var(--on-dark);}
  .sb-user .rl{font-family:var(--font-mono);font-size:.66rem;color:var(--on-dark-soft);}

  /* ---------- main ---------- */
  .main{display:flex;flex-direction:column;min-width:0;}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:20px;padding:18px 30px;background:color-mix(in srgb,var(--paper) 86%,transparent);backdrop-filter:blur(10px);border-bottom:1.5px solid var(--hairline);position:sticky;top:0;z-index:20;}
  .topbar h1{font-family:var(--font-display);font-weight:700;font-size:1.5rem;letter-spacing:-.02em;margin:0;}
  .search{display:flex;align-items:center;gap:9px;background:var(--white);border:1.5px solid var(--hairline);border-radius:var(--r-pill);padding:9px 16px;width:280px;color:var(--ink-mute);}
  .search svg{width:17px;height:17px;}
  .search input{border:none;background:none;outline:none;font-family:var(--font-body);font-size:.9rem;color:var(--ink);width:100%;}
  .top-actions{display:flex;align-items:center;gap:12px;}
  .icon-btn{width:40px;height:40px;border-radius:var(--r-md);border:1.5px solid var(--hairline);background:var(--white);display:grid;place-items:center;cursor:pointer;color:var(--ink-soft);transition:background var(--dur-fast),border-color var(--dur-fast);position:relative;}
  .icon-btn:hover{background:var(--paper);border-color:var(--ink);}
  .icon-btn svg{width:19px;height:19px;}
  .icon-btn .dot{position:absolute;top:8px;right:9px;width:7px;height:7px;border-radius:999px;background:var(--orange);border:1.5px solid var(--white);}

  .content{padding:30px;display:flex;flex-direction:column;gap:24px;}

  /* ---------- cards / primitives ---------- */
  .card{background:var(--white);border:1.5px solid var(--hairline);border-radius:var(--r-lg);box-shadow:var(--shadow-soft);}
  .card-pad{padding:22px 24px;}
  .stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;}
  .stat-card{padding:20px 22px;}
  .stat-card .top{display:flex;align-items:center;justify-content:space-between;}
  .stat-card .ico{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;border:1.5px solid var(--ink);}
  .stat-card .ico svg{width:19px;height:19px;}
  .stat-card .n{font-family:var(--font-display);font-weight:800;font-size:2.3rem;line-height:1;letter-spacing:-.02em;margin-top:18px;}
  .stat-card .l{font-family:var(--font-mono);font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-mute);margin-top:7px;}
  .stat-card .delta{font-family:var(--font-mono);font-size:.72rem;font-weight:700;}
  .delta.up{color:var(--teal);}.delta.down{color:var(--danger);}
  @media(max-width:1000px){.stat-row{grid-template-columns:repeat(2,1fr);}}

  .grid-2{display:grid;grid-template-columns:1.5fr 1fr;gap:24px;}
  @media(max-width:1100px){.grid-2{grid-template-columns:1fr;}}

  .card-head{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1.5px solid var(--hairline);}
  .card-head h3{font-family:var(--font-display);font-weight:700;font-size:1.15rem;margin:0;letter-spacing:-.01em;}
  .card-head .more{font-family:var(--font-mono);font-size:.74rem;color:var(--orange);cursor:pointer;font-weight:700;}

  /* avatar */
  .av{width:38px;height:38px;border-radius:999px;display:grid;place-items:center;font-family:var(--font-display);font-weight:700;font-size:.9rem;flex:none;border:1.5px solid var(--ink);}

  /* people list */
  .person{display:flex;align-items:center;gap:14px;padding:13px 24px;border-bottom:1px solid var(--hairline);cursor:pointer;transition:background var(--dur-fast);}
  .person:last-child{border-bottom:none;}
  .person:hover{background:var(--paper);}
  .person .meta{flex:1;min-width:0;}
  .person .nm{font-weight:600;font-size:.95rem;}
  .person .rl{font-family:var(--font-mono);font-size:.72rem;color:var(--ink-mute);}
  .badge{font-family:var(--font-mono);font-size:.68rem;font-weight:700;letter-spacing:.03em;border-radius:var(--r-pill);padding:5px 11px;border:1.5px solid var(--ink);white-space:nowrap;}
  .b-green{background:var(--teal-soft);}.b-gold{background:var(--gold-soft);}.b-pink{background:var(--pink-soft);}.b-orange{background:var(--orange-soft);}.b-grey{background:var(--paper-3);color:var(--ink-soft);}

  /* activity */
  .activity{display:flex;flex-direction:column;}
  .act{display:flex;gap:13px;padding:13px 24px;border-bottom:1px solid var(--hairline);}
  .act:last-child{border-bottom:none;}
  .act .dot{width:9px;height:9px;border-radius:999px;margin-top:6px;flex:none;}
  .act .t{font-size:.9rem;line-height:1.4;}
  .act .t b{font-weight:600;}
  .act .when{font-family:var(--font-mono);font-size:.68rem;color:var(--ink-mute);margin-top:3px;}

  /* mini bar chart */
  .bars{display:flex;align-items:flex-end;gap:14px;height:150px;padding:8px 4px 0;}
  .bars .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;height:100%;justify-content:flex-end;}
  .bars .bar{width:100%;border-radius:7px 7px 0 0;border:1.5px solid var(--ink);background:var(--gold);transition:height var(--dur-slow) var(--ease-funk);}
  .bars .cl{font-family:var(--font-mono);font-size:.66rem;color:var(--ink-mute);}

  /* segmented tabs */
  .segs{display:flex;gap:6px;background:var(--paper-2);border:1.5px solid var(--hairline);border-radius:var(--r-pill);padding:4px;}
  .seg{font-family:var(--font-mono);font-size:.74rem;font-weight:700;letter-spacing:.03em;padding:7px 16px;border-radius:var(--r-pill);border:none;background:none;cursor:pointer;color:var(--ink-soft);}
  .seg.active{background:var(--ink);color:var(--paper);}

  /* table */
  .ptable{width:100%;border-collapse:collapse;}
  .ptable th{text-align:left;font-family:var(--font-mono);font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-mute);padding:14px 24px;border-bottom:1.5px solid var(--hairline);font-weight:700;}
  .ptable td{padding:13px 24px;border-bottom:1px solid var(--hairline);font-size:.92rem;}
  .ptable tr{cursor:pointer;transition:background var(--dur-fast);}
  .ptable tbody tr:hover{background:var(--paper);}
  .cell-name{display:flex;align-items:center;gap:12px;}
  .cell-name .nm{font-weight:600;}

  /* pipeline */
  .pipe{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;align-items:start;}
  .pipe-col{background:var(--paper);border:1.5px solid var(--hairline);border-radius:var(--r-lg);padding:14px;}
  .pipe-col h4{font-family:var(--font-mono);font-size:.74rem;text-transform:uppercase;letter-spacing:.06em;margin:0 0 12px;display:flex;justify-content:space-between;align-items:center;}
  .pipe-col h4 .ct{background:var(--ink);color:var(--paper);border-radius:999px;padding:2px 9px;font-size:.66rem;}
  .pcard{background:var(--white);border:1.5px solid var(--ink);border-radius:var(--r-md);padding:13px;margin-bottom:10px;box-shadow:var(--shadow-hard);cursor:pointer;transition:transform var(--dur-fast) var(--ease-funk),box-shadow var(--dur-fast) var(--ease-funk);}
  .pcard:hover{transform:translate(-2px,-2px);box-shadow:5px 5px 0 var(--ink);}
  .pcard .pn{font-weight:600;font-size:.9rem;display:flex;align-items:center;gap:9px;}
  .pcard .pr{font-family:var(--font-mono);font-size:.7rem;color:var(--ink-mute);margin:7px 0 0 31px;}
  .pcard .pm{display:flex;gap:6px;margin:10px 0 0 31px;}
  @media(max-width:1100px){.pipe{grid-template-columns:repeat(2,1fr);}}

  /* drawer */
  .scrim{position:fixed;inset:0;background:rgba(24,21,19,.45);backdrop-filter:blur(2px);z-index:50;opacity:0;pointer-events:none;transition:opacity var(--dur-base);}
  .scrim.open{opacity:1;pointer-events:auto;}
  .drawer{position:fixed;top:0;right:0;height:100vh;width:420px;max-width:92vw;background:var(--paper);border-left:2.5px solid var(--ink);z-index:60;transform:translateX(100%);transition:transform var(--dur-base) var(--ease-out);overflow-y:auto;box-shadow:var(--shadow-soft-lg);}
  .drawer.open{transform:none;}
  .dr-hero{background:var(--teal);padding:26px 26px 0;position:relative;}
  .dr-close{position:absolute;top:16px;right:16px;width:34px;height:34px;border-radius:999px;border:1.5px solid var(--ink);background:var(--card);display:grid;place-items:center;cursor:pointer;}
  .dr-close svg{width:17px;height:17px;}
  .dr-av{width:88px;height:88px;border-radius:999px;border:2.5px solid var(--ink);display:grid;place-items:center;font-family:var(--font-display);font-weight:800;font-size:2rem;margin-bottom:-30px;box-shadow:var(--shadow-hard);}
  .dr-body{padding:44px 26px 30px;}
  .dr-body h2{font-family:var(--font-display);font-weight:700;font-size:1.6rem;letter-spacing:-.02em;margin:0;}
  .dr-role{font-family:var(--font-mono);font-size:.78rem;color:var(--teal);font-weight:700;margin-top:5px;}
  .dr-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:22px 0;}
  .dr-stat{background:var(--white);border:1.5px solid var(--hairline);border-radius:var(--r-md);padding:13px;text-align:center;}
  .dr-stat .n{font-family:var(--font-display);font-weight:800;font-size:1.4rem;}
  .dr-stat .l{font-family:var(--font-mono);font-size:.6rem;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-mute);margin-top:3px;}
  .dr-sect{font-family:var(--font-mono);font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft);font-weight:700;margin:22px 0 12px;}
  .dr-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--hairline);font-size:.9rem;}
  .dr-row .k{color:var(--ink-mute);font-family:var(--font-mono);font-size:.78rem;}

  @media(max-width:820px){.app{grid-template-columns:1fr;}.sidebar{display:none;}.search{display:none;}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script type="text/babel" src="dash-core.jsx"></script>
<script type="text/babel" src="dash-screens.jsx"></script>
<script type="text/babel" src="dash-app.jsx"></script>
</body>
</html>
